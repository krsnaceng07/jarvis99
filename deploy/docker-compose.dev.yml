version: '3.8'

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: jarvis-api-dev
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ..:/app
    ports:
      - "8000:8000"
    environment:
      - JARVIS_SYSTEM_ENVIRONMENT=development
      - JARVIS_SYSTEM_DEBUG=true
      - JARVIS_SYSTEM_LOG_LEVEL=DEBUG
      - JARVIS_DATABASE_HOST=db
      - JARVIS_DATABASE_PORT=5432
      - JARVIS_DATABASE_NAME=jarvis_db
      - JARVIS_DATABASE_USERNAME=jarvis_user
      - JARVIS_DATABASE_PASSWORD=secret_password
      - JARVIS_REDIS_HOST=redis
      - JARVIS_REDIS_PORT=6379
      - JARVIS_VAULT_ENCRYPTION_KEY_PATH=secrets/master.key
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: jarvis-db-dev
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jarvis_db
      - POSTGRES_USER=jarvis_user
      - POSTGRES_PASSWORD=secret_password
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis-dev
    ports:
      - "6379:6379"

volumes:
  pgdata:
