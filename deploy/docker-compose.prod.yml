version: '3.8'

services:
  api:
    image: jarvis-os-gateway:latest
    container_name: jarvis-api-prod
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    security_opt:
      - no-new-privileges:true
    read_only: false  # False since cache, logs, and skills dir need writes
    ports:
      - "8000"
    environment:
      - JARVIS_SYSTEM_ENVIRONMENT=production
      - JARVIS_SYSTEM_DEBUG=false
      - JARVIS_SYSTEM_LOG_LEVEL=INFO
      - JARVIS_DATABASE_HOST=db
      - JARVIS_DATABASE_PORT=5432
      - JARVIS_DATABASE_NAME=jarvis_db
      - JARVIS_DATABASE_USERNAME=jarvis_user
      # Secrets mounted externally
      - JARVIS_DATABASE_PASSWORD_FILE=/run/secrets/db_password
      - JARVIS_REDIS_HOST=redis
      - JARVIS_REDIS_PORT=6379
      - JARVIS_VAULT_ENCRYPTION_KEY_PATH=/run/secrets/vault_master_key
    secrets:
      - db_password
      - vault_master_key
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/platform/liveness"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: jarvis-db-prod
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
    environment:
      - POSTGRES_DB=jarvis_db
      - POSTGRES_USER=jarvis_user
      - POSTGRES_PASSWORD_FILE=/run/secrets/db_password
    secrets:
      - db_password
    volumes:
      - pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jarvis_user -d jarvis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: jarvis-redis-prod
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

secrets:
  db_password:
    file: ../secrets/db_password.txt
  vault_master_key:
    file: ../secrets/master.key

volumes:
  pgdata_prod:
