name: JARVIS OS CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  audit-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Ensure complete git history is fetched for modified file checks

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: '3.12'

      - name: Sync dependencies
        run: |
          uv sync --group dev

      - name: Run Automated Audit Framework
        run: |
          uv run python -m audit.cli --verbose

      - name: Run Architecture Linter
        run: |
          uv run python -m scripts.architecture_linter --config .architecture-linter.toml

      - name: Run Dependency Graph Validator
        run: |
          uv run python -m scripts.dgv

      - name: Run Trace Check
        run: |
          uv run python -m scripts.trace_check

      - name: Run Governance Check
        run: |
          uv run python -m scripts.governance_check

      - name: Run Ruff Format Check
        run: |
          uv run ruff format --check scripts tests

      - name: Run Ruff Lint Check
        run: |
          uv run ruff check scripts tests

      - name: Run MyPy Check
        run: |
          uv run mypy --strict scripts/architecture_linter.py scripts/dgv.py scripts/trace_check.py scripts/governance_check.py scripts/quality_gate.py tests/test_architecture_linter.py tests/test_dgv.py tests/test_trace_check.py tests/test_governance_check.py tests/test_quality_gate.py

      - name: Run Test Suite with Coverage
        run: |
          uv run pytest --cov=core --cov=api --cov-report=term-missing
